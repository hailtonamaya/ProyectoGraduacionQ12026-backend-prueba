<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UNITEC - Autenticación Facial Estudiantil</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api@1.7.12/dist/face-api.js"></script>
  <style>
    :root {
      --azul-oscuro: #06065C;
      --azul-medio: #0F49B6;
      --azul-claro: #03AED2;
      --rojo: #C3161C;
      --gris-texto: #6B7280;
      --gris-borde: #E5E7EB;
      --gris-fondo: #F5F6FA;
      --blanco: #FFFFFF;
      --negro: #1F2937;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Poppins', sans-serif;
      background: var(--gris-fondo);
      color: var(--negro);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .header {
      width: 100%;
      background: var(--blanco);
      padding: 14px 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-bottom: 1px solid var(--gris-borde);
    }

    .header-content {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .unitec-logo-img {
      height: 40px;
      width: auto;
      object-fit: contain;
    }

    .main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      width: 100%;
    }

    .card {
      background: var(--blanco);
      border-radius: 16px;
      box-shadow: 0 2px 16px rgba(0, 0, 0, 0.06);
      padding: 40px;
      width: 100%;
      max-width: 440px;
    }

    .card-title {
      font-size: 18px;
      font-weight: 600;
      color: var(--azul-oscuro);
      text-align: center;
      margin-bottom: 28px;
    }

    .tabs {
      display: flex;
      gap: 4px;
      background: var(--gris-fondo);
      padding: 4px;
      border-radius: 10px;
      margin-bottom: 28px;
    }

    .tab {
      flex: 1;
      padding: 10px 8px;
      text-align: center;
      border-radius: 8px;
      cursor: pointer;
      font-family: 'Poppins', sans-serif;
      font-weight: 500;
      font-size: 13px;
      transition: all 0.2s ease;
      border: none;
      background: transparent;
      color: var(--gris-texto);
    }

    .tab.active {
      background: var(--blanco);
      color: var(--azul-oscuro);
      font-weight: 600;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.08);
    }

    .tab:hover:not(.active) {
      color: var(--azul-oscuro);
    }

    .camera-wrapper {
      position: relative;
      width: 100%;
      border-radius: 12px;
      overflow: hidden;
      background: var(--gris-fondo);
      aspect-ratio: 4/3;
      margin-bottom: 8px;
      border: 1px solid var(--gris-borde);
    }

    .camera-wrapper video,
    .camera-wrapper canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      transform: scaleX(-1);
    }

    .camera-status {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      font-size: 11px;
      color: var(--gris-texto);
      margin-bottom: 24px;
    }

    .camera-status .indicator {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      display: inline-block;
    }

    .dot-green { background: #22C55E; }
    .dot-red { background: var(--rojo); }
    .dot-yellow { background: #F59E0B; }

    .capture-flash {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(255, 255, 255, 0.5);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.15s;
      z-index: 10;
    }

    .capture-flash.active { opacity: 1; }

    .form-group {
      margin-bottom: 18px;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--negro);
      margin-bottom: 6px;
    }

    .form-group input {
      width: 100%;
      padding: 12px 14px;
      border-radius: 8px;
      border: 1px solid var(--gris-borde);
      background: var(--blanco);
      color: var(--negro);
      font-family: 'Poppins', sans-serif;
      font-size: 14px;
      font-weight: 400;
      outline: none;
      transition: border-color 0.2s;
    }

    .form-group input::placeholder {
      color: #B0B5C0;
    }

    .form-group input:focus {
      border-color: var(--azul-medio);
      box-shadow: 0 0 0 3px rgba(15, 73, 182, 0.08);
    }

    .btn {
      width: 100%;
      padding: 13px;
      border-radius: 8px;
      border: none;
      font-family: 'Poppins', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      margin-top: 4px;
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-primary {
      background: var(--azul-oscuro);
      color: var(--blanco);
    }

    .btn-primary:hover:not(:disabled) {
      background: #08087A;
    }

    .model-status {
      text-align: center;
      font-size: 11px;
      font-weight: 500;
      padding: 6px 14px;
      border-radius: 6px;
      margin-bottom: 20px;
    }

    .model-loading {
      background: #FEF9C3;
      color: #92400E;
    }

    .model-ready {
      background: #DCFCE7;
      color: #166534;
    }

    .model-error {
      background: #FEE2E2;
      color: #991B1B;
    }

    .result-section {
      margin-top: 24px;
      padding-top: 24px;
      border-top: 1px solid var(--gris-borde);
    }

    .result-section h4 {
      font-size: 13px;
      font-weight: 600;
      color: var(--gris-texto);
      margin-bottom: 14px;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    .result-banner {
      text-align: center;
      padding: 18px;
      border-radius: 10px;
      margin-bottom: 16px;
    }

    .result-banner.success {
      background: #F0FDF4;
      border: 1px solid #BBF7D0;
    }

    .result-banner.fail {
      background: #FEF2F2;
      border: 1px solid #FECACA;
    }

    .result-banner .icon { font-size: 28px; margin-bottom: 4px; }
    .result-banner .label { font-size: 15px; font-weight: 600; }
    .result-banner.success .label { color: #166534; }
    .result-banner.fail .label { color: #991B1B; }

    .result-details {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .result-row {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
    }

    .result-row .key { color: var(--gris-texto); }
    .result-row .val { color: var(--negro); font-weight: 600; }

    .confidence-bar {
      width: 100%;
      height: 4px;
      background: var(--gris-borde);
      border-radius: 2px;
      overflow: hidden;
      margin-top: 4px;
    }

    .confidence-bar .fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.6s ease;
    }

    .fill-success { background: #22C55E; }
    .fill-fail { background: var(--rojo); }

    .console-toggle {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      font-size: 11px;
      color: var(--gris-texto);
      cursor: pointer;
      padding: 8px;
      margin-top: 16px;
      border: none;
      background: none;
      font-family: 'Poppins', sans-serif;
      width: 100%;
    }

    .console-toggle:hover { color: var(--azul-oscuro); }

    .console-toggle .arrow {
      transition: transform 0.2s;
      font-size: 10px;
    }

    .console-toggle.open .arrow {
      transform: rotate(180deg);
    }

    .console-box {
      background: var(--gris-fondo);
      border: 1px solid var(--gris-borde);
      border-radius: 8px;
      padding: 10px 12px;
      font-family: 'Courier New', monospace;
      font-size: 10px;
      max-height: 120px;
      overflow-y: auto;
      color: var(--gris-texto);
      margin-top: 8px;
    }

    .console-box::-webkit-scrollbar { width: 3px; }
    .console-box::-webkit-scrollbar-track { background: transparent; }
    .console-box::-webkit-scrollbar-thumb { background: var(--gris-borde); border-radius: 2px; }

    .console-box .entry { margin-bottom: 2px; }
    .console-box .time { color: var(--azul-medio); }
    .console-box .ok { color: #166534; }
    .console-box .err { color: var(--rojo); }

    .hidden { display: none; }

    .footer {
      text-align: center;
      padding: 20px;
      font-size: 12px;
      color: var(--gris-texto);
    }
  </style>
</head>
<body>

<div class="header">
  <div class="header-content">
    <img src="/img/unitec-logo-horizontal.png" alt="UNITEC" class="unitec-logo-img">
  </div>
</div>

<div class="main">
  <div class="card">
    <div style="text-align:center; margin-bottom:24px;">
      <img src="/img/unitec-logo-vertical.png" alt="UNITEC" style="height:80px; width:auto; object-fit:contain;">
    </div>
    <div class="card-title">Autenticación Facial Estudiantil</div>

    <div id="modelStatus" class="model-status model-loading">Cargando modelos de IA…</div>

    <div class="tabs">
      <div class="tab active" onclick="switchTab('register')" id="tabRegister">Registrar</div>
      <div class="tab" onclick="switchTab('verify')" id="tabVerify">Verificar</div>
    </div>

    <div class="camera-wrapper">
      <video id="video" autoplay muted playsinline></video>
      <canvas id="overlay"></canvas>
      <div id="flash" class="capture-flash"></div>
    </div>
    <div class="camera-status">
      <span class="indicator"><span class="dot dot-yellow" id="camDot"></span><span id="camLabel">Iniciando cámara…</span></span>
      <span class="indicator"><span class="dot dot-yellow" id="faceDot"></span><span id="faceLabel">Sin rostro</span></span>
    </div>

    <div id="panelRegister">
      <div class="form-group">
        <label>Correo institucional</label>
        <input type="email" id="regEmail" placeholder="usuario@unitec.edu">
      </div>
      <div class="form-group">
        <label>Nombre completo</label>
        <input type="text" id="regName" placeholder="Nombre del estudiante">
      </div>
      <button class="btn btn-primary" id="btnRegister" onclick="registerFace()" disabled>
        Capturar y Registrar
      </button>
    </div>

    <div class="hidden" id="panelVerify">
      <div class="form-group">
        <label>Correo institucional registrado</label>
        <input type="email" id="verEmail" placeholder="usuario@unitec.edu">
      </div>
      <button class="btn btn-primary" id="btnVerify" onclick="verifyFace()" disabled>
        Capturar y Verificar
      </button>
    </div>

    <div class="hidden" id="resultPanel">
      <div class="result-section">
        <h4>Resultado</h4>
        <div id="resultContent"></div>
      </div>
    </div>

    <button class="console-toggle" id="consoleToggle" onclick="toggleConsole()">
      <span>Consola de IA</span>
      <span class="arrow">&#9660;</span>
    </button>
    <div class="console-box hidden" id="consoleBox">
      <div id="log">
        <div class="entry"><span class="time">[sistema]</span> Inicializando face-api.js…</div>
      </div>
    </div>
  </div>
</div>

<div class="footer">&copy; 2026 UNITEC</div>

<script>
const API_BASE = window.location.origin + '/api/ia'
const MODEL_URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api@1.7.12/model'

const video = document.getElementById('video')
const overlay = document.getElementById('overlay')
const logEl = document.getElementById('log')

let modelsLoaded = false
let currentDetection = null

function addLog(msg, type = '') {
  const time = new Date().toLocaleTimeString('es-GT', { hour12: false })
  const cls = type === 'ok' ? 'ok' : type === 'err' ? 'err' : ''
  logEl.innerHTML += `<div class="entry"><span class="time">[${time}]</span> <span class="${cls}">${msg}</span></div>`
  const box = document.getElementById('consoleBox')
  box.scrollTop = box.scrollHeight
}

function switchTab(tab) {
  document.getElementById('tabRegister').classList.toggle('active', tab === 'register')
  document.getElementById('tabVerify').classList.toggle('active', tab === 'verify')
  document.getElementById('panelRegister').classList.toggle('hidden', tab !== 'register')
  document.getElementById('panelVerify').classList.toggle('hidden', tab !== 'verify')
  document.getElementById('resultPanel').classList.add('hidden')
}

function toggleConsole() {
  const box = document.getElementById('consoleBox')
  const btn = document.getElementById('consoleToggle')
  box.classList.toggle('hidden')
  btn.classList.toggle('open')
}

function flash() {
  const el = document.getElementById('flash')
  el.classList.add('active')
  setTimeout(() => el.classList.remove('active'), 200)
}

async function init() {
  try {
    addLog('Cargando modelo SSD MobileNet v1...')
    await faceapi.nets.ssdMobilenetv1.loadFromUri(MODEL_URL)
    addLog('SSD MobileNet v1 cargado', 'ok')

    addLog('Cargando modelo Face Landmarks 68 puntos...')
    await faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL)
    addLog('Face Landmarks 68 cargado', 'ok')

    addLog('Cargando modelo FaceNet (descriptor 128D)...')
    await faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
    addLog('FaceNet cargado', 'ok')

    modelsLoaded = true
    const status = document.getElementById('modelStatus')
    status.className = 'model-status model-ready'
    status.textContent = 'Modelos de IA listos'
    addLog('Todos los modelos de IA cargados correctamente', 'ok')

    document.getElementById('btnRegister').disabled = false
    document.getElementById('btnVerify').disabled = false

    await startCamera()
    detectLoop()
  } catch (err) {
    addLog('Error al cargar modelos: ' + err.message, 'err')
    const status = document.getElementById('modelStatus')
    status.className = 'model-status model-error'
    status.textContent = 'Error al cargar modelos'
  }
}

async function startCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { width: 640, height: 480, facingMode: 'user' }
    })
    video.srcObject = stream
    await new Promise(r => video.onloadedmetadata = r)
    overlay.width = video.videoWidth
    overlay.height = video.videoHeight
    document.getElementById('camDot').className = 'dot dot-green'
    document.getElementById('camLabel').textContent = 'Cámara activa'
    addLog('Cámara iniciada (' + video.videoWidth + 'x' + video.videoHeight + ')', 'ok')
  } catch (err) {
    document.getElementById('camDot').className = 'dot dot-red'
    document.getElementById('camLabel').textContent = 'Sin acceso a cámara'
    addLog('Error de cámara: ' + err.message, 'err')
  }
}

async function detectLoop() {
  if (!modelsLoaded) return

  const detection = await faceapi
    .detectSingleFace(video)
    .withFaceLandmarks()
    .withFaceDescriptor()

  const ctx = overlay.getContext('2d')
  ctx.clearRect(0, 0, overlay.width, overlay.height)

  if (detection) {
    currentDetection = detection
    document.getElementById('faceDot').className = 'dot dot-green'
    document.getElementById('faceLabel').textContent = 'Rostro detectado'

    const box = detection.detection.box

    ctx.strokeStyle = '#0F49B6'
    ctx.lineWidth = 2
    ctx.beginPath()
    ctx.roundRect(box.x, box.y, box.width, box.height, 6)
    ctx.stroke()

    const cornerLen = 16
    ctx.strokeStyle = '#06065C'
    ctx.lineWidth = 3
    ctx.beginPath()
    ctx.moveTo(box.x, box.y + cornerLen); ctx.lineTo(box.x, box.y); ctx.lineTo(box.x + cornerLen, box.y)
    ctx.stroke()
    ctx.beginPath()
    ctx.moveTo(box.x + box.width - cornerLen, box.y); ctx.lineTo(box.x + box.width, box.y); ctx.lineTo(box.x + box.width, box.y + cornerLen)
    ctx.stroke()
    ctx.beginPath()
    ctx.moveTo(box.x, box.y + box.height - cornerLen); ctx.lineTo(box.x, box.y + box.height); ctx.lineTo(box.x + cornerLen, box.y + box.height)
    ctx.stroke()
    ctx.beginPath()
    ctx.moveTo(box.x + box.width - cornerLen, box.y + box.height); ctx.lineTo(box.x + box.width, box.y + box.height); ctx.lineTo(box.x + box.width, box.y + box.height - cornerLen)
    ctx.stroke()

    const landmarks = detection.landmarks.positions
    ctx.fillStyle = 'rgba(15, 73, 182, 0.5)'
    for (const pt of landmarks) {
      ctx.beginPath()
      ctx.arc(pt.x, pt.y, 1.2, 0, 2 * Math.PI)
      ctx.fill()
    }

    const score = (detection.detection.score * 100).toFixed(0)
    ctx.font = '500 12px Poppins'
    ctx.fillStyle = 'rgba(255,255,255,0.8)'
    const textW = ctx.measureText(score + '%').width
    ctx.fillRect(box.x, box.y - 22, textW + 10, 18)
    ctx.fillStyle = '#06065C'
    ctx.fillText(score + '%', box.x + 5, box.y - 8)
  } else {
    currentDetection = null
    document.getElementById('faceDot').className = 'dot dot-yellow'
    document.getElementById('faceLabel').textContent = 'Sin rostro'
  }

  requestAnimationFrame(detectLoop)
}

async function captureDescriptor() {
  if (!currentDetection) {
    alert('No se detecta un rostro. Coloca tu rostro frente a la cámara.')
    return null
  }

  flash()
  addLog('Capturando descriptor facial...')

  const descriptors = []
  for (let i = 0; i < 3; i++) {
    const det = await faceapi
      .detectSingleFace(video)
      .withFaceLandmarks()
      .withFaceDescriptor()
    if (det) descriptors.push(Array.from(det.descriptor))
    await new Promise(r => setTimeout(r, 100))
  }

  if (descriptors.length === 0) {
    addLog('No se pudo capturar descriptor', 'err')
    return null
  }

  const avg = new Array(128).fill(0)
  for (const d of descriptors) {
    for (let i = 0; i < 128; i++) avg[i] += d[i]
  }
  for (let i = 0; i < 128; i++) avg[i] /= descriptors.length

  addLog(`Descriptor promediado de ${descriptors.length} muestras`, 'ok')
  return avg
}

async function registerFace() {
  const email = document.getElementById('regEmail').value.trim()
  const fullName = document.getElementById('regName').value.trim()

  if (!email || !fullName) {
    alert('Completa email y nombre')
    return
  }

  addLog(`Registro facial para: ${email}`)
  const descriptor = await captureDescriptor()
  if (!descriptor) return

  try {
    addLog('Enviando al servidor...')
    const res = await fetch(API_BASE + '/face/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, full_name: fullName, descriptor })
    })

    const data = await res.json()

    if (data.success) {
      addLog('Rostro registrado exitosamente', 'ok')
      showResult({ type: 'register', success: true, data: data.data })
    } else {
      addLog('Error: ' + data.message, 'err')
      showResult({ type: 'register', success: false, message: data.message })
    }
  } catch (err) {
    addLog('Error de red: ' + err.message, 'err')
  }
}

async function verifyFace() {
  const email = document.getElementById('verEmail').value.trim()
  if (!email) {
    alert('Ingresa el email registrado')
    return
  }

  addLog(`Verificación facial para: ${email}`)
  const descriptor = await captureDescriptor()
  if (!descriptor) return

  try {
    addLog('Enviando para comparación...')
    const res = await fetch(API_BASE + '/face/verify', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, descriptor })
    })

    const data = await res.json()

    if (data.success) {
      const r = data.data
      if (r.match) {
        addLog(`MATCH - Confianza: ${r.confidence}%`, 'ok')
      } else {
        addLog(`NO MATCH - Distancia: ${r.distance}`, 'err')
      }
      showResult({ type: 'verify', success: true, data: r })
    } else {
      addLog('Error: ' + data.message, 'err')
      showResult({ type: 'verify', success: false, message: data.message })
    }
  } catch (err) {
    addLog('Error de red: ' + err.message, 'err')
  }
}

function showResult(result) {
  const panel = document.getElementById('resultPanel')
  const content = document.getElementById('resultContent')
  panel.classList.remove('hidden')

  if (result.type === 'register') {
    if (result.success) {
      content.innerHTML = `
        <div class="result-banner success">
          <div class="icon">&#10003;</div>
          <div class="label">Rostro Registrado</div>
        </div>
        <div class="result-details">
          <div class="result-row"><span class="key">Email</span><span class="val">${result.data.email}</span></div>
          <div class="result-row"><span class="key">Nombre</span><span class="val">${result.data.full_name}</span></div>
        </div>`
    } else {
      content.innerHTML = `
        <div class="result-banner fail">
          <div class="icon">&#10007;</div>
          <div class="label">Error al registrar</div>
        </div>
        <p style="color:#991B1B; text-align:center; font-size:13px; margin-top:8px">${result.message}</p>`
    }
    return
  }

  if (!result.success) {
    content.innerHTML = `
      <div class="result-banner fail">
        <div class="icon">&#10007;</div>
        <div class="label">Error</div>
      </div>
      <p style="color:#991B1B; text-align:center; font-size:13px; margin-top:8px">${result.message}</p>`
    return
  }

  const d = result.data
  const fillClass = d.match ? 'fill-success' : 'fill-fail'
  const barWidth = d.match ? d.confidence : Math.max(5, d.confidence)

  content.innerHTML = `
    <div class="result-banner ${d.match ? 'success' : 'fail'}">
      <div class="icon">${d.match ? '&#10003;' : '&#10007;'}</div>
      <div class="label">${d.match ? 'Identidad Verificada' : 'No Coincide'}</div>
    </div>
    <div class="result-details">
      ${d.match ? `<div class="result-row"><span class="key">Nombre</span><span class="val">${d.full_name}</span></div>` : ''}
      ${d.match ? `<div class="result-row"><span class="key">Email</span><span class="val">${d.email}</span></div>` : ''}
      <div class="result-row"><span class="key">Confianza</span><span class="val">${d.confidence}%</span></div>
      <div class="confidence-bar"><div class="fill ${fillClass}" style="width:${barWidth}%"></div></div>
      <div class="result-row"><span class="key">Distancia</span><span class="val">${d.distance}</span></div>
    </div>`
}

init()
</script>
</body>
